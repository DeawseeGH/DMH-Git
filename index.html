<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="#">Navbar</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Features</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Pricing</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link disabled">Disabled</a>
                        </li>
                    </ul>   
        </nav>

        <div class="container-fluid m-2 p-2 border text-center text-success">
            <h1 class="display-3">Welcome to Bootstrap 5</h1>
            <p class="lead text-center">This is a simple Bootstrap page.</p>
        </div>

        <div class = "row">
            <div class="col-6 col-md-4 col-lg-3 bg-primary text-white text-center gx-2 gy-2">
                <h2 class="display-6">Column 6</h2>
            </div>
            <div class="col-6 col-md-4 col-lg-3 bg-success text-white text-center gx-2 gy-2">
                <h2 class="display-6">Column 6</h2>
            </div>
            <div class="col-6 col-md-4 col-lg-3 bg-danger text-white text-center gx-2 gy-2">
                <h2 class="display-6">Column 6</h2>
            </div>
            <div class="col-6 col-md-4 col-lg-3 bg-warning text-white text-center gx-2 gy-2">
                <h2 class="display-6">Column 6</h2>
            </div>
        </div>
        <div class="col-12 mt-2 p-2 text-center">
            <button class="btn btn-md btn-primary">Click Me</button>
            <button class="btn btn-lg btn-success">Click Me</button>
            <button class="btn btn-lg btn-outline-primary">Click Me</button>
        </div>

        <div class="row">
            <div class="col-12 col-md-6 col-lg-4 text-left gx-2 gy-2">
                <div class = "border card h-100">
                    <div class = "card-body">
                        <h2 class="h5 m-2 text-primary">Nested Row</h2>
                        <p class="m-2">This is a simple paragraph within the nested row.</p>
                        <img src="/picture.jpg" class="col-12 col-md-6 col-lg-4" alt="Placeholder Image">
                    </div>
                    <div class="col-12 mt-2 p-2 text-center">
                        <button class="btn btn-lg w-20 btn-outline-primary">Click Me</button>
                        <button class="btn btn-lg w-20 btn-info">Click Me</button>
                    </div>
                </div>
            </div>
        </div>

        <div class ="row">
            <div class="container">
                <form class="row g-3">
                    <div class="col-md-6">
                        <label for="inputEmail4" class="form-label">Email</label>
                        <input type="email" class="form-control" id="inputEmail4" required> 
                    </div>
                    <div class="col-md-6">
                        <label for="inputPassword4" class="form-label">Password</label>
                        <input type="password" class="form-control" id="inputPassword4" required>
                    </div>
                    <div class="col-12">
                        <label for="inputAddress" class="form-label">Address</label>
                        <input type="text" class="form-control" id="inputAddress" placeholder="1234 Main St" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Sign in</button>
                </form>
            </div>
        </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
